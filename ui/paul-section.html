                        <div class="text-xs text-gray-500 uppercase tracking-wider">What The Pauls Said</div>
                        <div class="text-xs text-gray-500" id="paulCountDisplay">Showing 6 of 6 Pauls</div>

                            <button onclick="filterByType('analytical')" class="px-2 py-1 bg-purple-500/20 hover:bg-purple-500/30 rounded text-purple-400">Analytical</button>

                    <div id="paulList" class="space-y-3 max-h-[500px] overflow-y-auto">
