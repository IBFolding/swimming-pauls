# Swimming Pauls - Local Configuration
# No cloud services, no 3rd party APIs - runs entirely on your machine

[core]
# Use local SQLite for all persistence
memory_backend = "sqlite"
database_path = "~/.openclaw/workspace/swimming_pauls/data/swimming_pauls.db"

# Disable all cloud services
enable_zep = false
enable_cloud_sync = false

[data_feeds]
# Local-only data sources
enable_local_files = true
enable_rss_feeds = true
enable_web_scraping = true

# Disable API-dependent sources
enable_news_api = false
enable_reddit_api = false
enable_twitter_api = false
enable_market_api = false

# Local data directories
local_data_path = "~/.openclaw/workspace/swimming_pauls/local_data/"
rss_feeds_file = "~/.openclaw/workspace/swimming_pauls/config/rss_feeds.txt"

[agents]
# Number of Pauls to spawn
default_pool_size = 40
max_pool_size = 100

# Use local persona generation
persona_source = "local_factory"
enable_persona_breeding = true

[knowledge_graph]
# Local graph storage
storage_backend = "sqlite"
graph_db_path = "~/.openclaw/workspace/swimming_pauls/data/knowledge_graph.db"

# Local NLP (no cloud LLMs)
use_local_nlp = true
entity_extraction_method = "pattern"  # pattern-based, not API

[simulation]
# Local computation only
compute_backend = "local"
max_threads = 8

[visualization]
# Terminal and file-based outputs only
output_formats = ["terminal", "html", "png"]
enable_cloud_charts = false
