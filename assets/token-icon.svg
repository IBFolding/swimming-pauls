<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tokenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="50%" stop-color="#808080"/>
      <stop offset="100%" stop-color="#404040"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#tokenGrad)"/>
  
  <!-- Inner ring -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
  
  <!-- Circuit pattern -->
  <g stroke="#fff" stroke-width="1" opacity="0.2" fill="none">
    <circle cx="200" cy="200" r="140"/>
    <circle cx="200" cy="200" r="110"/>
    <line x1="200" y1="60" x2="200" y2="90"/>
    <line x1="200" y1="310" x2="200" y2="340"/>
    <line x1="60" y1="200" x2="90" y2="200"/>
    <line x1="310" y1="200" x2="340" y2="200"/>
    <circle cx="200" cy="75" r="5" fill="#fff"/>
    <circle cx="200" cy="325" r="5" fill="#fff"/>
    <circle cx="75" cy="200" r="5" fill="#fff"/>
    <circle cx="325" cy="200" r="5" fill="#fff"/>
  </g>
  
  <!-- Central icon: Fish with teeth -->
  <g transform="translate(200 200)">
    <!-- Fish body -->
    <ellipse cx="0" cy="0" rx="80" ry="50" fill="#1a1a2e" stroke="url(#metal)" stroke-width="3"/>
    
    <!-- Tail -->
    <path d="M-70 0 L-110 -30 L-110 30 Z" fill="#1a1a2e" stroke="url(#metal)" stroke-width="2"/>
    
    <!-- Grill/teeth -->
    <g fill="url(#metal)">
      <rect x="20" y="-20" width="8" height="15" rx="2"/>
      <rect x="32" y="-22" width="8" height="18" rx="2"/>
      <rect x="44" y="-20" width="8" height="15" rx="2"/>
      <rect x="20" y="5" width="8" height="15" rx="2"/>
      <rect x="32" y="4" width="8" height="18" rx="2"/>
      <rect x="44" y="5" width="8" height="15" rx="2"/>
    </g>
    
    <!-- Eye -->
    <circle cx="50" cy="-15" r="8" fill="#ec4899"/>
    <circle cx="52" cy="-17" r="3" fill="#fff"/>
  </g>
  
  <!-- $PAUL text -->
  <text x="200" y="360" text-anchor="middle" font-size="32" font-family="system-ui" font-weight="bold" fill="#fff">$PAUL</text>
</svg>
